services:
  # Nuestro motor de Base de Datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: dkaizen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dkaizen_barber
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  # Esto guarda los datos para que no se borren si apagamos el contenedor
  pg_data: